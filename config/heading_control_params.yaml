# ==============================================================================
# BNO055 Production Heading Controller ROS 2 Parameters Configuration
# ==============================================================================

bno055_heading_control_node:
  ros__parameters:
    # --------------------------------------------------------------------------
    # 1. Topic Configuration & Passthrough Pipeline
    # --------------------------------------------------------------------------
    imu_topic: "imu/data"             # Input IMU topic from BNO055 driver
    cmd_vel_in_topic: "cmd_vel_in"     # Raw input velocity command (Teleop / Nav2)
    cmd_vel_out_topic: "cmd_vel"       # Corrected output velocity command for motors

    # --------------------------------------------------------------------------
    # 2. Production PID Controller Gains & Anti-Windup Limits
    # --------------------------------------------------------------------------
    kp: 0.05                           # Proportional Gain (Initial correction force)
    ki: 0.001                          # Integral Gain (Long-term friction bias compensation)
    kd: 0.01                           # Derivative Gain (Direct Gyro-based anti-slip braking)
    max_i_term: 0.2                    # Anti-windup integral saturation limit (+-0.2)
    max_output: 1.0                    # Maximum angular velocity correction limit (rad/s)
    angular_deadband: 0.01             # Turning threshold (rad/s) to disengage heading lock

    # --------------------------------------------------------------------------
    # 3. Safety Watchdog & Fail-Safe Protection
    # --------------------------------------------------------------------------
    cmd_vel_timeout: 0.5               # Command loss timeout (s). Triggers Zero Velocity stop
    imu_timeout: 1.0                   # IMU loss timeout (s). Triggers Fail-Safe Passthrough
    enable_diagnostics: true           # Publish 1Hz real-time diagnostic status (/diagnostics)
